<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>听力答案句测试</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f0e8; color: #2c2c2c; min-height: 100vh; }
  #home { display: flex; flex-direction: column; align-items: center; padding: 60px 24px; }
  #home h1 { font-size: 2.2rem; font-weight: 700; color: #4a3728; margin-bottom: 12px; }
  #home p.sub { color: #7a6a5a; margin-bottom: 40px; font-size: 1rem; text-align: center; line-height: 1.6; }
  .start-btn { padding: 18px 56px; border-radius: 14px; background: linear-gradient(135deg, #c07a30, #e8a44a); border: none; color: #fff; font-size: 1.15rem; font-weight: 600; cursor: pointer; box-shadow: 0 4px 16px rgba(192,122,48,0.4); transition: all 0.18s; }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(192,122,48,0.5); }
  #quiz { display: none; flex-direction: column; align-items: center; padding: 24px 16px; }
  .quiz-header { width: 100%; max-width: 720px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .back-btn { background: none; border: 1px solid #c8b898; border-radius: 8px; padding: 8px 18px; cursor: pointer; color: #7a6a5a; font-size: 0.9rem; transition: all 0.15s; }
  .back-btn:hover { background: #fffdf7; color: #4a3728; }
  .quiz-title { font-size: 1rem; font-weight: 600; color: #4a3728; }
  .progress-text { font-size: 0.9rem; color: #9a8a7a; }
  .progress-bar-wrap { width: 100%; max-width: 720px; background: #e8dfc8; border-radius: 99px; height: 8px; margin-bottom: 28px; }
  .progress-bar-fill { height: 8px; border-radius: 99px; background: linear-gradient(90deg, #c07a30, #e8a44a); transition: width 0.4s ease; }
  .card { width: 100%; max-width: 720px; background: #fffdf7; border-radius: 18px; box-shadow: 0 2px 18px rgba(0,0,0,0.07); padding: 28px 32px; margin-bottom: 20px; }
  .audio-area { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; padding-bottom: 18px; border-bottom: 1px solid #e8dfc8; }
  .play-btn { width: 54px; height: 54px; border-radius: 50%; background: linear-gradient(135deg, #c07a30, #e8a44a); border: none; cursor: pointer; color: #fff; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 12px rgba(192,122,48,0.35); transition: all 0.15s; flex-shrink: 0; }
  .play-btn:hover { transform: scale(1.07); }
  .play-btn.speaking { background: linear-gradient(135deg, #6aaa64, #4caf50); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 3px 10px rgba(106,170,100,0.4); } 50% { box-shadow: 0 3px 20px rgba(106,170,100,0.7); } }
  .audio-hint { font-size: 0.85rem; color: #9a8a7a; }
  .audio-hint strong { color: #c07a30; font-size: 0.9rem; display: block; margin-bottom: 2px; }
  .para-label { font-size: 0.75rem; color: #9a8a7a; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
  .para-text { font-size: 1.08rem; line-height: 1.85; color: #2c2c2c; background: #faf5ec; border-radius: 10px; padding: 16px 18px; }
  .blank-word { display: inline-block; min-width: 140px; border-bottom: 2.5px solid #c07a30; color: transparent; background: #ffe5c0; border-radius: 4px; padding: 0 10px; margin: 0 4px; font-size: 0.95em; vertical-align: middle; transition: all 0.3s; }
  .blank-word.reveal { color: #388e3c; background: #e8f5e9; border-bottom-color: #6aaa64; font-weight: 600; }
  .blank-word.wrong-reveal { color: #c62828; background: #ffebee; border-bottom-color: #e57373; }
  .options-wrap { width: 100%; max-width: 720px; margin-bottom: 20px; }
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .opt-btn { background: #fffdf7; border: 2px solid #d4c8b0; border-radius: 12px; padding: 14px 18px; cursor: pointer; text-align: left; font-size: 0.92rem; color: #2c2c2c; line-height: 1.45; transition: all 0.15s; display: flex; align-items: flex-start; gap: 10px; }
  .opt-btn:hover:not(:disabled) { border-color: #c07a30; background: #fff8ee; }
  .opt-btn .opt-letter { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; background: #e8dfc8; color: #7a6a5a; font-weight: 700; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; }
  .opt-btn.selected { border-color: #c07a30; background: #fff8ee; }
  .opt-btn.selected .opt-letter { background: #c07a30; color: #fff; }
  .opt-btn.correct { border-color: #6aaa64; background: #f0faf0; }
  .opt-btn.correct .opt-letter { background: #6aaa64; color: #fff; }
  .opt-btn.wrong { border-color: #e57373; background: #fff5f5; }
  .opt-btn.wrong .opt-letter { background: #e57373; color: #fff; }
  .opt-btn:disabled { cursor: default; }
  .confirm-btn { display: none; padding: 14px 48px; border-radius: 12px; background: linear-gradient(135deg, #c07a30, #e8a44a); border: none; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; box-shadow: 0 3px 12px rgba(192,122,48,0.35); transition: all 0.15s; }
  .confirm-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(192,122,48,0.45); }
  #result { display: none; flex-direction: column; align-items: center; padding: 60px 24px; text-align: center; }
  .result-emoji { font-size: 4.5rem; margin-bottom: 16px; }
  .result-score { font-size: 3.2rem; font-weight: 700; color: #c07a30; margin-bottom: 8px; }
  .result-label { color: #7a6a5a; font-size: 1.05rem; margin-bottom: 32px; }
  .result-details { width: 100%; max-width: 640px; background: #fffdf7; border-radius: 16px; box-shadow: 0 2px 18px rgba(0,0,0,0.07); padding: 20px; margin-bottom: 24px; text-align: left; max-height: 320px; overflow-y: auto; }
  .result-item { padding: 12px 16px; border-bottom: 1px solid #e8dfc8; }
  .result-item:last-child { border-bottom: none; }
  .result-item .q-num { font-weight: 600; color: #c07a30; margin-right: 8px; }
  .result-item .answer { font-size: 0.9rem; }
  .result-item.correct .answer { color: #388e3c; }
  .result-item.wrong .answer { color: #c62828; }
  .result-item .correct-answer { font-size: 0.85rem; color: #7a6a5a; margin-top: 4px; }
  .result-btn { padding: 13px 40px; border-radius: 10px; border: none; cursor: pointer; font-size: 0.95rem; font-weight: 600; margin: 6px; transition: all 0.15s; }
  .result-btn.primary { background: linear-gradient(135deg, #c07a30, #e8a44a); color: #fff; box-shadow: 0 3px 12px rgba(192,122,48,0.3); }
  .result-btn.secondary { background: #fffdf7; border: 2px solid #d4c8b0; color: #4a3728; }
  .result-btn:hover { transform: translateY(-1px); }
  @media (max-width: 540px) {
    .options-grid { grid-template-columns: 1fr; }
    .card { padding: 20px 18px; }
    #home h1 { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<div id="home">
  <h1>听力答案句测试</h1>
  <p class="sub">从120句中随机抽取10句进行测试<br>完成后显示正确率</p>
  <button class="start-btn" onclick="startTest()">开始测试</button>
</div>

<div id="quiz">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">&#8592; 返回</button>
    <span class="quiz-title">答案句测试</span>
    <span class="progress-text" id="progressText"></span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="card">
    <div class="audio-area">
      <button class="play-btn" id="playBtn" onclick="playAudio()">&#9654;</button>
      <div class="audio-hint">
        <strong>点击播放录音</strong>
        选出空格处对应的替换词
      </div>
    </div>
    <div class="para-label">改写表达</div>
    <div class="para-text" id="paraText"></div>
  </div>
  <div class="options-wrap">
    <div class="options-grid" id="optionsGrid"></div>
  </div>
  <button class="confirm-btn" id="confirmBtn" onclick="nextQuestion()">确认答案</button>
</div>

<div id="result">
  <div class="result-emoji" id="resultEmoji"></div>
  <div class="result-score" id="resultScore"></div>
  <div class="result-label" id="resultLabel"></div>
  <div class="result-details" id="resultDetails"></div>
  <div>
    <button class="result-btn primary" onclick="startTest()">再测一次</button>
    <button class="result-btn secondary" onclick="goHome()">返回主页</button>
  </div>
</div>

<script>
// 120题数据 - 所有题目合并为一个数组
const ALL_QUESTIONS = [{"id":1,"original":"There are marked trails, but you can also leave these and go off on your own and that's an experience not to be missed.","paraphrase":"There are clearly marked paths to follow, but you can also get away from regular trails and explore alone — that's something you really shouldn't miss.","blank":"There are clearly marked paths to follow, but you can also ______ and explore alone — that's something you really shouldn't miss.","answer":"get away from regular trails","options":["get away from regular trails","take a different route","stay on the main road","find your own way back"],"correct_idx":0},{"id":2,"original":"If you want, you can have your own team for the afternoon and learn how to drive them.","paraphrase":"If you're interested, you can get your own group in the afternoon and learn to drive a team of dogs.","blank":"If you're interested, you can get your own group in the afternoon and learn ______.","answer":"to drive a team of dogs","options":["to lead a group hike","to join the guide's team","to drive a team of dogs","to ride a horse alone"],"correct_idx":2},{"id":3,"original":"There's a medal for everyone who takes part.","paraphrase":"Every person who joins in gets a medal — so all participants will receive one.","blank":"Every person who joins in gets a medal — so ______ will receive one.","answer":"all participants","options":["all participants","some lucky winners","the top performers","a few selected members"],"correct_idx":0},{"id":4,"original":"It's a long ascent, though not too steep, and walkers generally take a couple of days to get to the summit.","paraphrase":"The climb is quite long, but not very steep, and most people take about two days to get to the summit.","blank":"The climb is quite long, but not very steep, and most people take about two days to ______.","answer":"get to the summit","options":["return to the base","reach the starting point","get to the summit","follow the guide downhill"],"correct_idx":2},{"id":5,"original":"In that case, stay in the hut — generally the storms don't last long.","paraphrase":"If that happens, just wait in the hut — the storms usually pass quickly.","blank":"If that happens, just ______ in the hut — the storms usually pass quickly.","answer":"wait","options":["leave the area","move to higher ground","wait","call for help"],"correct_idx":2},{"id":6,"original":"This trail's been designed to give first-timers an experience they'll enjoy regardless of their age or skill.","paraphrase":"This path is made for beginners to have a great time, and it's suitable for all abilities, no matter how old you are.","blank":"This path is made for beginners to have a great time, and it's ______, no matter how old you are.","answer":"suitable for all abilities","options":["suitable for all abilities","for experts only","requires previous training","only for adults"],"correct_idx":0},{"id":7,"original":"But if you've fully mastered the techniques needed for hills, it's great fun.","paraphrase":"However, it demands a lot of skill with hill-climbing techniques, and once you've got those down, it's really enjoyable.","blank":"However, it ______ with hill-climbing techniques, and once you've got those down, it's really enjoyable.","answer":"demands a lot of skill","options":["demands a lot of skill","is easy for beginners","needs no preparation","requires no practice"],"correct_idx":0},{"id":8,"original":"There's a shelter half-way where you can sit and take a break.","paraphrase":"Halfway along, there's a covered spot where you can stop and rest for a while.","blank":"Halfway along, there's a covered spot where you can ______ for a while.","answer":"stop and rest","options":["keep moving forward","check your equipment","stop and rest","speed up the pace"],"correct_idx":2},{"id":9,"original":"If it's snowing or windy, check with us before you set out to make sure the trail's open that day.","paraphrase":"If the weather turns snowy or windy, ask us before heading out — the trail may be closed that day.","blank":"If the weather turns snowy or windy, ask us before heading out — the trail ______ that day.","answer":"may be closed","options":["is always open","needs a booking","closes at noon","may be closed"],"correct_idx":3},{"id":10,"original":"Because they felt they were doing something really useful, nearly everyone agreed that volunteering made them feel more motivated at work.","paraphrase":"Since they felt their work was useful, almost all of them said that volunteering made them feel more motivated at their jobs.","blank":"Since they felt their work was useful, almost all of them said that volunteering made them feel more motivated at their jobs.","answer":"almost all / useful / motivated","options":["almost all / useful / motivated","half of them / pointless / happy","none of them / tiring / lazy","a small number / sad / bored"],"correct_idx":0},{"id":11,"original":"Our staff were able to help them improve their telephone skills, such as writing down messages and speaking with confidence.","paraphrase":"Our team helped them get better at their communication skills — things like taking messages and speaking more confidently.","blank":"Our team helped them get better at their ______ — things like taking messages and speaking more confidently.","answer":"communication skills","options":["writing skills","research skills","sports skills","communication skills"],"correct_idx":3},{"id":12,"original":"If you're interested in taking part, please go to the volunteering section of our website and complete the relevant form.","paraphrase":"If you'd like to join in, just visit the volunteering page on our website and fill in a form.","blank":"If you'd like to join in, just visit the volunteering page on our website and ______.","answer":"fill in a form","options":["send an email","attend an interview","make a phone call","fill in a form"],"correct_idx":3},{"id":13,"original":"Quite a few owned both a computer and a mobile phone, but these tended to be outdated models.","paraphrase":"Many of them had both a computer and a mobile phone, but these were usually old-fashioned models.","blank":"Many of them had both a computer and a mobile phone, but these were usually ______ models.","answer":"old-fashioned","options":["old-fashioned","very expensive","brand new","hard to find"],"correct_idx":0},{"id":14,"original":"A few were keen to learn but most were quite dismissive at first.","paraphrase":"Some were eager to learn, but at the beginning most of them showed little interest.","blank":"Some were eager to learn, but at the beginning most of them ______.","answer":"showed little interest","options":["asked many questions","showed little interest","showed great concern","were very eager"],"correct_idx":1},{"id":15,"original":"Participants all said they felt much more confident about using social media to keep in touch with their grandchildren.","paraphrase":"Everyone who took part said they felt a lot more sure of themselves using social media for communicating with family, especially their grandchildren.","blank":"Everyone who took part said they felt a lot more sure of themselves using social media for ______, especially their grandchildren.","answer":"communicating with family","options":["communicating with family","playing online games","travelling abroad","attending work meetings"],"correct_idx":0},{"id":16,"original":"You'll see a big difference in a relatively short space of time.","paraphrase":"You'll notice fast results — a big change in just a short period.","blank":"You'll notice ______ — a big change in just a short period.","answer":"fast results","options":["slow progress","fast results","no improvement","a long wait"],"correct_idx":1},{"id":17,"original":"It's a very accessible form of exercise.","paraphrase":"This type of exercise is open to everyone — your fitness level is unimportant.","blank":"This type of exercise is open to everyone — your fitness level is unimportant.","answer":"fitness level unimportant","options":["only for athletes","for young people only","requires special training","fitness level unimportant"],"correct_idx":3},{"id":18,"original":"You can swim in an indoor pool at any time of year.","paraphrase":"You can use the indoor pool all year round — it's not dependent on season.","blank":"You can use the indoor pool all year round — it's ______.","answer":"not dependent on season","options":["only available outdoors","not dependent on season","best in summer","requires good weather"],"correct_idx":1},{"id":19,"original":"Many people say being out in the fresh air in a park or in the countryside can be fun.","paraphrase":"A lot of people find it very enjoyable to be outdoors, breathing fresh air in a park or in the countryside.","blank":"A lot of people find it very ______ to be outdoors, breathing fresh air in a park or in the countryside.","answer":"enjoyable","options":["challenging","enjoyable","educational","tiring"],"correct_idx":1},{"id":20,"original":"There's less chance of hurting yourself than with other more active sports.","paraphrase":"Compared to other more active sports, there's a low risk of injury here.","blank":"Compared to other more active sports, there's a ______ here.","answer":"low risk of injury","options":["demands physical strength","high chance of falling","low risk of injury","requires protective gear"],"correct_idx":2},{"id":21,"original":"But if you've got someone there to encourage you and help you achieve your goals, you're less likely to give up.","paraphrase":"Having someone by your side cheering you on is really motivating — you won't quit so easily.","blank":"Having someone by your side cheering you on is really ______ — you won't quit so easily.","answer":"motivating","options":["makes you feel tired","leads to competition","motivating","causes more pressure"],"correct_idx":2},{"id":22,"original":"That's when they give up hope and stop believing they'll ever achieve their goals.","paraphrase":"That's the point where they suffer a loss of confidence — they stop believing they can reach their goals.","blank":"That's the point where they suffer a ______ — they stop believing they can reach their goals.","answer":"loss of confidence","options":["loss of confidence","extra motivation","sudden success","quick recovery"],"correct_idx":0},{"id":23,"original":"Also, what people sometimes don't realise when they start is that it takes a lot of determination and hard work to keep training week after week.","paraphrase":"And people often don't understand at first that too much effort is required — it takes real drive and hard work to train every week.","blank":"And people often don't understand at first that too much effort is required — it takes real drive and hard work to train every week.","answer":"too much effort required","options":["no special skills required","too much effort required","very little time needed","easy to fit in daily life"],"correct_idx":1},{"id":24,"original":"Set manageable goals — be realistic and don't push yourself too far.","paraphrase":"Set achievable aims — keep it realistic and don't push yourself too hard.","blank":"Set ______ — keep it realistic and don't push yourself too hard.","answer":"achievable aims","options":["strict daily rules","impossible targets","high expectations","achievable aims"],"correct_idx":3},{"id":25,"original":"Give yourself a really nice treat every time you reach one of your goals.","paraphrase":"Every time you hit a goal, give yourself rewards — something you really enjoy.","blank":"Every time you hit a goal, give yourself ______ — something you really enjoy.","answer":"rewards","options":["public recognition","extra training","strict rules","rewards"],"correct_idx":3},{"id":26,"original":"But it's the overall rise in the volume of traffic of all kinds that's concerning us.","paraphrase":"What worries us, however, is the overall increase in the amount of traffic of every type.","blank":"What worries us, however, is the overall increase in the amount of traffic of every type.","answer":"amount / increase","options":["amount / increase","quality / drop","cost / fall","speed / reduction"],"correct_idx":0},{"id":27,"original":"People were very concerned about the lack of visibility on some roads due to cars parked along the sides of the roads.","paraphrase":"Many people were worried about the inconvenience caused by poor visibility on roads where cars were parked along both sides.","blank":"Many people were worried about the ______ caused by poor visibility on roads where cars were parked along both sides.","answer":"inconvenience","options":["poor road conditions","heavy rain","traffic lights","inconvenience"],"correct_idx":3},{"id":28,"original":"But, of course, it's no good introducing new regulations if we don't have a way of making sure that everyone obeys them.","paraphrase":"But of course, new rules are useless if there's no way to make sure everyone follows them.","blank":"But of course, new rules are useless if there's no way to make sure everyone ______s them.","answer":"follow","options":["ignore","follow","question","break"],"correct_idx":1},{"id":29,"original":"Episodic memories include various details about these events, for example, when an event happened and other information such as the location.","paraphrase":"Episodic memories hold many details about events — for instance, the time something happened and other facts like the place.","blank":"Episodic memories hold many details about events — for instance, the ______ something happened and other facts like the place.","answer":"time","options":["time","result","reason","place"],"correct_idx":0},{"id":30,"original":"That is your general knowledge of the world.","paraphrase":"That refers to your general information — what you know about the world.","blank":"That refers to your general ______ — what you know about the world.","answer":"information","options":["feeling","opinion","information","memory"],"correct_idx":2},{"id":31,"original":"Semantic memory isn't dependent on recalling personal experiences.","paraphrase":"Semantic memory doesn't involve remembering things that happened to you personally.","blank":"Semantic memory doesn't ______ remembering things that happened to you personally.","answer":"involve","options":["require","involve","be separate from","depend heavily on"],"correct_idx":1},{"id":32,"original":"The degree to which you can successfully encode information depends on the level of attention you give to an event while it's actually happening.","paraphrase":"The more attention you pay to something while it's happening, the more successfully you can store it in your memory.","blank":"The more attention you pay to something while it's happening, the more successfully you can store it in your memory.","answer":"the more A, the more B","options":["B is unrelated to A","A and B are the same","the more A, the more B","the less A, the more B"],"correct_idx":2},{"id":33,"original":"Consolidation is most effective when the information being stored can be linked to an existing network of information.","paraphrase":"Memory consolidation works best when new information can be added to a network of things you already know.","blank":"Memory consolidation works best when new information can ______ a network of things you already know.","answer":"be added to","options":["be added to","be removed from","be separate from","replace"],"correct_idx":0},{"id":34,"original":"Forming strong memories depends on the frequency with which you try to retrieve them.","paraphrase":"How often you try to recall a memory affects how strong that memory becomes.","blank":"How often you try to recall a memory affects how strong that memory becomes.","answer":"A affects B","options":["A and B cancel each other","B is not related to A","A affects B","A is caused by B"],"correct_idx":2},{"id":35,"original":"For example, when recalling where you parked your car you may use the colour of a sign close to where you parked.","paraphrase":"For instance, to remember where you left your car, you might use the colour of a sign near to the parking spot.","blank":"For instance, to remember where you left your car, you might use the colour of a sign near to the parking spot.","answer":"near to / left your car","options":["near to / left your car","opposite to / lost your car","far from / driven your car","behind / moved your car"],"correct_idx":0},{"id":36,"original":"Recent studies have shown that computer-assisted games designed to keep the brain active can help improve their episodic memory.","paraphrase":"New research shows that computer games made to stimulate the brain can help older people improve their episodic memory.","blank":"New research shows that computer games made to ______ the brain can help older people improve their episodic memory.","answer":"stimulate","options":["entertain","stimulate","slow down","replace"],"correct_idx":1},{"id":37,"original":"This may be caused by an absence of a sense of self.","paraphrase":"This might happen because the concept of self is absent — they lack a clear sense of who they are.","blank":"This might happen because the concept of self is absent — they lack a clear sense of who they are.","answer":"be absent / concept","options":["disappear / emotion","be absent / concept","exist / awareness","be present / feeling"],"correct_idx":1},{"id":38,"original":"In 1623, the ruler of Constantinople demanded the destruction of all the coffee houses in the city.","paraphrase":"In 1623, the leader of Constantinople ordered that every coffee house in the city be torn down.","blank":"In 1623, the leader of Constantinople ______ed that every coffee house in the city be torn down.","answer":"order","options":["allow","request","suggest","order"],"correct_idx":3},{"id":39,"original":"Because of this, some people said that these places performed a similar function to universities.","paraphrase":"For this reason, some people believed that coffee houses could be compared to universities in what they offered.","blank":"For this reason, some people believed that coffee houses could ______ universities in what they offered.","answer":"be compared to","options":["be different from","be replaced by","be compared to","be better than"],"correct_idx":2},{"id":40,"original":"Many social movements and political developments had their origins in coffee house discussions.","paraphrase":"A lot of social and political changes first started from conversations that took place in coffee houses.","blank":"A lot of ______ first started from conversations that took place in coffee houses.","answer":"social and political changes","options":["cultural traditions","scientific discoveries","economic problems","social and political changes"],"correct_idx":3},{"id":41,"original":"It's interesting that the names given to these different types, like Mocha or Java coffee, were often taken from the port they were shipped to Europe from.","paraphrase":"Interestingly, the names of different coffee types, such as Mocha or Java, were often chosen according to the port they were sent to Europe from.","blank":"Interestingly, the names of different coffee types, such as Mocha or Java, were often chosen ______ the port they were sent to Europe from.","answer":"according to","options":["chosen by","based on","named after","according to"],"correct_idx":3},{"id":42,"original":"So it was used as a means of taxation.","paraphrase":"So it was used as a form of taxation — a way to collect money from people.","blank":"So it was used as ______ taxation — a way to collect money from people.","answer":"a form of","options":["a reason for","a type of","a form of","a method of"],"correct_idx":2},{"id":43,"original":"And it became nearly as important as sugar production.","paraphrase":"And it grew to become almost as important as producing sugar.","blank":"And it grew to become ______ as important as producing sugar."," erything in our porcelain and glass collection was left to the museum by ______ — the founder, who died in 1878.","answer":"one person","options":["several different owners","a group of artists","one person","a foreign collector"],"correct_idx":2},{"id":55,"original":"On Wednesday afternoon, the director of the play we're going to see that evening will talk to us at the theatre.","paraphrase":"On Wednesday afternoon, the theatre director of the play we'll watch that evening will speak with us at the theatre.","blank":"On Wednesday afternoon, the ______ of the play we'll watch that evening will speak with us at the theatre.","answer":"theatre director","options":["the set designer","the stage manager","theatre director","the lead actor"],"correct_idx":2},{"id":56,"original":"The play we're seeing on Wednesday evening is a modern one, and we're going to the premiere.","paraphrase":"The play on Wednesday evening is a modern piece, and it will be performed for the first time — we're going to the opening night.","blank":"The play on Wednesday evening is a modern piece, and it will ______ — we're going to the opening night.","answer":"be performed for the first time","options":["be performed for the first time","postponed to next week","cancelled due to rain","shown for the last time"],"correct_idx":0},{"id":57,"original":"Friday's play will really make you think hard about what clothes to pack, as it'll be in the garden of a palace.","paraphrase":"Friday's show will really get you thinking about what to wear, since it'll be outdoors — in the garden of a palace.","blank":"Friday's show will really get you thinking about what to wear, since it'll be ______ — in the garden of a palace.","answer":"outdoors","options":["in a modern theatre","outdoors","at a private club","in a large indoor hall"],"correct_idx":1},{"id":58,"original":"And the mayor and all the other dignitaries of the town will be attending.","paraphrase":"And officials from the town, including the mayor, will // 测试模式变量
let testQuestions = [];
let currentQ = 0;
let score = 0;
let selectedAnswer = null;
const synth = window.speechSynthesis;
const LETTERS = ['A','B','C','D'];

function goHome() {
  synth.cancel();
  document.getElementById('home').style.display = 'flex';
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'none';
}

function startTest() {
  // 随机抽取10题
  testQuestions = shuffle([...ALL_QUESTIONS]).slice(0, 10);
  currentQ = 0;
  score = 0;
  
  document.getElementById('home').style.display = 'none';
  document.getElementById('quiz').style.display = 'flex';
  document.getElementById('result').style.display = 'none';
  
  loadQuestion();
}

function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function loadQuestion() {
  selectedAnswer = null;
  synth.cancel();

  const q = testQuestions[currentQ];
  const total = testQuestions.length;

  document.getElementById('progressText').textContent = (currentQ+1) + ' / ' + total;
  document.getElementById('progressFill').style.width = (currentQ / total * 100) + '%';

  const playBtn = document.getElementById('playBtn');
  playBtn.classList.remove('speaking');
  playBtn.innerHTML = '&#9654;';

  const paraEl = document.getElementById('paraText');
  const blankHtml = q.blank.replace('______', '<span class="blank-word" id="blankSpan">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
  paraEl.innerHTML = blankHtml;

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  q.options.forEach(function(opt, i) {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = '<span class="opt-letter">' + LETTERS[i] + '</span><span>' + opt + '</span>';
    btn.addEventListener('click', function() { selectOption(i, btn); });
    grid.appendChild(btn);
  });

  document.getElementById('confirmBtn').style.display = 'none';
}

function playAudio() {
  const q = testQuestions[currentQ];
  const playBtn = document.getElementById('playBtn');

  synth.cancel();

  if (playBtn.classList.contains('speaking')) {
    playBtn.classList.remove('speaking');
    playBtn.innerHTML = '&#9654;';
    return;
  }

  const utter = new SpeechSynthesisUtterance(q.original);
  utter.lang = 'en-GB';
  utter.rate = 0.9;
  utter.onstart = function() {
    playBtn.classList.add('speaking');
    playBtn.innerHTML = '&#9724;';
  };
  utter.onend = function() {
    playBtn.classList.remove('speaking');
    playBtn.innerHTML = '&#9654;';
  };
  utter.onerror = function() {
    playBtn.classList.remove('speaking');
    playBtn.innerHTML = '&#9654;';
  };
  synth.speak(utter);
}

function selectOption(idx, btnEl) {
  if (selectedAnswer !== null) return;
  selectedAnswer = idx;

  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(function(b) { b.classList.remove('selected'); });
  btnEl.classList.add('selected');

  document.getElementById('confirmBtn').style.display = 'inline-block';
}

function nextQuestion() {
  const q = testQuestions[currentQ];
  const isCorrect = (selectedAnswer === q.correct_idx);
  if (isCorrect) score++;

  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(function(b) { b.disabled = true; });
  btns[q.correct_idx].classList.add('correct');
  if (selectedAnswer !== q.correct_idx) {
    btns[selectedAnswer].classList.add('wrong');
  }

  const blankSpan = document.getElementById('blankSpan');
  if (blankSpan) {
    blankSpan.textContent = q.answer;
    blankSpan.className = 'blank-word ' + (isCorrect ? 'reveal' : 'wrong-reveal');
  }

  document.getElementById('progressFill').style.width = ((currentQ+1) / testQuestions.length * 100) + '%';

  setTimeout(function() {
    if (currentQ + 1 >= testQuestions.length) {
      showResult();
    } else {
      currentQ++;
      loadQuestion();
    }
  }, 1500);
}

function showResult() {
  synth.cancel();
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'flex';

  const pct = Math.round(score / testQuestions.length * 100);
  let emoji = '&#127942;', label = '满分！太厉害了！';
  if (pct < 40) { emoji = '&#128170;'; label = '继续加油！多听多练会有进步的！'; }
  else if (pct < 60) { emoji = '&#128527;'; label = '不错！还有提升空间！'; }
  else if (pct < 80) { emoji = '&#128515;'; label = '很好！再接再厉！'; }
  else if (pct < 100) { emoji = '&#11088;'; label = '非常棒！差一点就满分了！'; }

  document.getElementById('resultEmoji').innerHTML = emoji;
  document.getElementById('resultScore').textContent = pct + '%';
  document.getElementById('resultLabel').textContent = score + ' / ' + testQuestions.length + ' 正确';

  const details = document.getElementById('resultDetails');
  details.innerHTML = '<div style="font-weight:600;color:#4a3728;margin-bottom:12px;">答题详情</div>';
  testQuestions.forEach(function(q, i) {
    const isCorrect = q.correct_idx === q.userAnswer;
    const div = document.createElement('div');
    div.className = 'result-item ' + (isCorrect ? 'correct' : 'wrong');
    div.innerHTML =
      '<span class="q-num">Q' + (i+1) + '</span>' +
      '<span class="answer">' + (isCorrect ? '&#10003; 正确' : '&#10007; 错误') + '</span>' +
      (!isCorrect ? '<div class="correct-answer">正确答案：' + q.options[q.correct_idx] + '</div>' : '');
    details.appendChild(div);
  });
}
</script>
